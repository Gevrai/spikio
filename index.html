<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='35' fill='%23FF4757'/><polygon points='85,50 55,40 55,60' fill='%23FF4757' stroke='white' stroke-width='2'/></svg>" />
    <title>Spikio</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        touch-action: none;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        position: fixed;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <button id="fullscreen-btn" style="
      position: fixed; bottom: 12px; left: 12px; z-index: 20;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 20px; width: 44px; height: 44px;
      border-radius: 10px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; padding: 0;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      touch-action: manipulation;
    " title="Fullscreen">⛶</button>
    <script>
      document.getElementById('fullscreen-btn').addEventListener('click', function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function(){});
        } else {
          document.exitFullscreen();
        }
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
